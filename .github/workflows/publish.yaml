name: Publish presentation
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  publish:
    uses: symentispl/symentis-pl/.github/workflows/build-presentation.yml@master
    with:
      slug: concurrency-lessons-learned # must match the markdown filename in symentis-pl
    secrets:
      R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}